name: 'Notify on Push'
description: 'Sends notifications when a push event occurs'
author: 'developjik'

inputs:
  slack_webhook_url:
    description: 'Slack Incoming Webhook URL'
    required: false
  discord_webhook_url:
    description: 'Discord Incoming Webhook URL'
    required: false
  telegram_bot_token:
    description: 'Telegram Bot Token'
    required: false
  telegram_chat_id:
    description: 'Telegram Chat ID'
    required: false
  include_diff_links:
    description: 'Include commit diff links in the notification (true/false)'
    required: false
    default: 'true'
  notify_time_range:
    description: 'Time range to send notifications (e.g., 09:00-17:00 UTC)'
    required: false
  min_commit_count:
    description: 'Minimum number of commits to trigger notification'
    required: false
    default: '1'
  batch_interval:
    description: 'Time interval in minutes to batch notifications (e.g., 5)'
    required: false
    default: '0'
  show_quality_score:
    description: 'Show a quality score for commits (true/false)'
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'
